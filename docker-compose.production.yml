version: '3'

volumes:
  pg_data:
  static:
  media:

services:
  db:
    image: postgres:13
    container_name: db
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    image: lovecatsnyou/kittygram_backend
    container_name: backend
    env_file: .env
    depends_on:
      - db
    volumes:
      - static:/app/collected_static
      - media:/app/media

  frontend:
    image: lovecatsnyou/kittygram_frontend
    container_name: frontend
    volumes:
      - static:/app/build

  gateway:
    image: lovecatsnyou/kittygram_gateway
    container_name: gateway
    depends_on:
      - backend
      - frontend
    ports:
      - "9000:80"
    volumes:
      - static:/staticfiles
      - media:/media
